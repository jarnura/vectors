<!DOCTYPE html>
<html>
  <head>
    <title> Vectors </title>
    <style>
      html, body {
        margin: 0;
      }
      #canvas {
        position: absolute;
        left: 0;
        right: 0;
        width: 100%;
        height: 100%;
      }
      #controls {
        position: absolute;
        top: 104px;
        left: 16px;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 8px;
        max-width: 280px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #e6edff;
        background: rgba(15, 20, 35, 0.55);
        -webkit-backdrop-filter: blur(10px) saturate(140%);
        backdrop-filter: blur(10px) saturate(140%);
        padding: 10px 14px;
        border-radius: 14px;
        border: 1px solid rgba(140, 170, 235, 0.28);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        /* Hidden left-drawer default state: slid off-screen + transparent and
           non-interactive so the closed drawer never traps canvas events. The
           anime.js panel toggle slides it IN (translateX -120% → 0%,
           opacity 0 → 1) and OUT again. */
        transform: translateX(-120%);
        opacity: 0;
        pointer-events: none;
      }
      #controls label {
        color: #9fb6e6;
        font-weight: 600;
        letter-spacing: 0.3px;
        user-select: none;
      }
      #controls button {
        font: inherit;
        color: #eaf2ff;
        background: rgba(90, 120, 200, 0.28);
        border: 1px solid rgba(150, 180, 240, 0.35);
        border-radius: 999px;
        padding: 6px 14px;
        cursor: pointer;
        transition: background 0.18s ease, border-color 0.18s ease,
          transform 0.12s ease, box-shadow 0.18s ease;
      }
      #controls button:hover {
        background: rgba(120, 155, 245, 0.45);
        border-color: rgba(180, 205, 255, 0.6);
        box-shadow: 0 2px 12px rgba(90, 130, 240, 0.35);
      }
      #controls button:active {
        transform: translateY(1px) scale(0.97);
      }
      #controls input[type="number"] {
        font: inherit;
        color: #eaf2ff;
        background: rgba(8, 14, 28, 0.55);
        border: 1px solid rgba(150, 180, 240, 0.3);
        border-radius: 8px;
        padding: 5px 8px;
        width: 64px;
      }
      #controls input[type="checkbox"] {
        accent-color: #7f9bf5;
      }
      #controls .controls-sep {
        color: rgba(150, 180, 240, 0.35);
        padding: 0 2px;
        user-select: none;
      }
      /* Compact D-pad grouping for the orbit buttons (reuses #controls button
         styling; this only lays the five buttons out as a directional pad). */
      #controls .orbit-pad {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }
      #controls .orbit-pad-row {
        display: inline-flex;
        gap: 3px;
      }
      #controls .orbit-pad button {
        padding: 4px 8px;
        min-width: 30px;
      }
      #shear-value {
        width: 64px;
      }
      #atom-labels {
        position: absolute;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }
      .atom-label {
        position: absolute;
        left: 0;
        top: 0;
        /* transform (translate to the atom + centre offset) is set inline per
           frame by Labels.js; this baseline keeps the label anchored at 0,0. */
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #f2f6ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85), 0 0 6px rgba(0, 0, 0, 0.6);
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
      }
      #scene-title {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 1;
        font-family: sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #panel-toggle {
        position: absolute;
        top: 52px;
        left: 16px;
        z-index: 3;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 18px;
        color: #eaf2ff;
        background: rgba(15, 20, 35, 0.55);
        -webkit-backdrop-filter: blur(10px) saturate(140%);
        backdrop-filter: blur(10px) saturate(140%);
        border: 1px solid rgba(140, 170, 235, 0.28);
        border-radius: 50%;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        cursor: pointer;
      }
      #panel-toggle:hover {
        background: rgba(90, 120, 200, 0.45);
        border-color: rgba(180, 205, 255, 0.6);
      }
      #atom-label {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1;
        margin-top: 24px;
        text-align: center;
        font-family: sans-serif;
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #9ec5ff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        display: none;
      }
      #orbital-info {
        position: absolute;
        bottom: 16px;
        left: 0;
        right: 0;
        z-index: 1;
        text-align: center;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 18px;
        letter-spacing: 1px;
        color: #7fb0e6;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        display: none;
      }
      #molecule-info {
        position: absolute;
        top: 100px;
        right: 16px;
        z-index: 1;
        min-width: 200px;
        font-family: sans-serif;
        background: rgba(8, 14, 28, 0.78);
        border: 1px solid rgba(120, 160, 230, 0.45);
        border-radius: 8px;
        padding: 10px 14px;
        color: #cfe0ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        display: none;
      }
      .mol-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 3px 0;
        font-size: 15px;
      }
      .mol-label {
        color: #8fb3e6;
        font-weight: 600;
      }
      .mol-value {
        color: #eaf2ff;
      }
      /* Materials scene: data-driven cards gallery. Positioned at the bottom of
         the canvas, a horizontal flex row of glassy cards — one per entry in
         Lattice.structures. Hidden by default (display:none); shown only in the
         Materials scene via MaterialsCards.showMaterialsCards(true). Cards have
         pointer-events:auto so clicks reach them; the container has
         pointer-events:none by default so the hidden gallery never traps canvas
         orbit-drag/wheel events when in other scenes. */
      #materials-cards {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        display: none;
        flex-direction: row;
        gap: 16px;
        align-items: flex-end;
        pointer-events: none;
      }
      .material-card {
        pointer-events: auto;
        cursor: pointer;
        min-width: 120px;
        padding: 12px 16px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #e6edff;
        background: rgba(15, 20, 35, 0.62);
        -webkit-backdrop-filter: blur(12px) saturate(140%);
        backdrop-filter: blur(12px) saturate(140%);
        border: 1px solid rgba(140, 170, 235, 0.28);
        border-radius: 14px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        display: flex;
        flex-direction: column;
        gap: 4px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
        user-select: none;
        /* Start hidden for the stagger entrance */
        opacity: 0;
      }
      .material-card:hover {
        border-color: rgba(180, 205, 255, 0.55);
        box-shadow: 0 8px 32px rgba(90, 130, 240, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .material-card-selected {
        border-color: rgba(140, 180, 255, 0.75) !important;
        box-shadow: 0 0 18px rgba(100, 150, 255, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
        background: rgba(30, 45, 80, 0.72) !important;
      }
      .material-card-name {
        font-size: 15px;
        font-weight: 700;
        color: #c8d8ff;
        letter-spacing: 0.3px;
      }
      .material-card-formula {
        font-size: 13px;
        color: #7fb0e6;
        font-weight: 500;
      }
      .material-card-hybrid {
        font-size: 12px;
        color: #8fa8d0;
        font-style: italic;
      }
      /* Materials scene: data-driven structure info panel. Positioned in the
         lower-left area of the canvas (below the #panel-toggle icon, clear of
         the #controls drawer which slides in from the left) so it never
         overlaps #pe-overlay (top-right) or #materials-cards (bottom-centre).
         Hidden by default; shown only in the Materials scene. Mirrors the
         #molecule-info layout so renderInfoPanel can be reused directly. */
      #materials-info {
        position: absolute;
        bottom: 100px;
        left: 16px;
        z-index: 1;
        min-width: 200px;
        max-width: 280px;
        font-family: sans-serif;
        background: rgba(8, 14, 28, 0.78);
        border: 1px solid rgba(120, 160, 230, 0.45);
        border-radius: 8px;
        padding: 10px 14px;
        color: #cfe0ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        display: none;
      }
      /* Nuclide scene: live nuclear state info panel. Positioned top-right,
         mirrors #molecule-info layout. Hidden by default; shown only in the
         Nuclide scene via Controls.showNuclidePanel. */
      #nuclide-info {
        position: absolute;
        top: 100px;
        right: 16px;
        z-index: 1;
        min-width: 220px;
        max-width: 300px;
        font-family: sans-serif;
        background: rgba(8, 14, 28, 0.78);
        border: 1px solid rgba(120, 160, 230, 0.45);
        border-radius: 8px;
        padding: 10px 14px;
        color: #cfe0ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        display: none;
      }
      /* Nuclide controls drawer section: shown inside the left drawer only in
         the Nuclide scene. Flex-column layout, hidden by default. */
      #nuclide-controls {
        display: none;
        flex-direction: column;
        gap: 6px;
        width: 100%;
      }
      /* Builder + Materials potential-energy (Morse) curve overlay. A small
         glassy panel in the top-right corner; pointer-events:none so it never
         blocks the canvas. Hidden by default; shown in Builder and Materials. */
      #pe-overlay {
        position: absolute;
        top: 100px;
        right: 16px;
        z-index: 1;
        width: 220px;
        height: 140px;
        box-sizing: border-box;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        background: rgba(8, 14, 28, 0.72);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border: 1px solid rgba(120, 160, 230, 0.45);
        border-radius: 8px;
        padding: 6px 8px;
        color: #cfe0ff;
        pointer-events: none;
        display: none;
      }
      #pe-overlay svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="atom-labels"></div>
    <div id="scene-title">Cube POC</div>
    <button id="panel-toggle" type="button" aria-label="Toggle controls">☰</button>
    <div id="atom-label">Carbon</div>
    <div id="orbital-info">1s2 2s2 2p2</div>
    <div id="molecule-info"></div>
    <div id="materials-info"></div>
    <div id="nuclide-info"></div>
    <div id="pe-overlay"></div>
    <div id="materials-cards"></div>
    <div id="controls">
      <button id="scene-toggle" type="button">Switch scene</button>
      <label for="view-2d">2D</label>
      <input id="view-2d" type="checkbox" />
      <label for="valence-only">Valence&nbsp;only</label>
      <input id="valence-only" type="checkbox" />
      <label for="free-electrons-only">Free&nbsp;only</label>
      <input id="free-electrons-only" type="checkbox" />
      <label for="antibonding">Anti&nbsp;bonding</label>
      <input id="antibonding" type="checkbox" />
      <label for="drag-strength">Drag&nbsp;strength</label>
      <input id="drag-strength" type="range" min="0" max="10" step="0.1" value="3" />
      <label for="layer-space">Layer&nbsp;space</label>
      <input id="layer-space" type="range" min="1.0" max="4.0" step="0.1" value="1.6" />
      <label for="subshell-view">Sub-shells</label>
      <input id="subshell-view" type="checkbox" checked />
      <span class="controls-sep">|</span>
      <label for="element-value">Element&nbsp;Z</label>
      <input id="element-value" type="number" min="1" max="36" step="1" value="6" />
      <span class="controls-sep">|</span>
      <label for="shear-value">Shear</label>
      <input id="shear-value" type="number" step="0.1" value="0.5" />
      <button id="shear-btn" type="button">Apply</button>
      <span class="controls-sep">|</span>
      <button id="bond-btn" type="button">Form bond</button>
      <span class="controls-sep">|</span>
      <button id="add-btn" type="button">Add</button>
      <button id="clear-btn" type="button">Clear</button>
      <span class="controls-sep">|</span>
      <!-- Nuclide scene transmutation controls: hidden when not in the Nuclide scene -->
      <div id="nuclide-controls">
        <label>Nuclide</label>
        <button id="nuc-add-proton" type="button">+Proton</button>
        <button id="nuc-remove-proton" type="button">−Proton</button>
        <button id="nuc-add-neutron" type="button">+Neutron</button>
        <button id="nuc-remove-neutron" type="button">−Neutron</button>
        <button id="nuc-reset" type="button">Reset (C-12)</button>
        <label for="nuclide-z">Z</label>
        <input id="nuclide-z" type="number" min="0" max="118" step="1" value="6" />
        <label for="nuclide-n">N</label>
        <input id="nuclide-n" type="number" min="0" max="200" step="1" value="6" />
        <button id="nuc-set" type="button">Set Z+N</button>
        <!-- M3: Named-reaction buttons -->
        <label>Reactions</label>
        <button id="react-alpha" type="button">α Decay</button>
        <button id="react-beta-minus" type="button">β− Decay</button>
        <button id="react-beta-plus" type="button">β+/EC Decay</button>
        <label for="fuse-z2">Fuse Z₂</label>
        <input id="fuse-z2" type="number" min="1" max="118" step="1" value="1" />
        <label for="fuse-n2">N₂</label>
        <input id="fuse-n2" type="number" min="0" max="200" step="1" value="2" />
        <button id="react-fuse" type="button">Fuse</button>
        <label for="fiss-za">Fiss. f1 Z</label>
        <input id="fiss-za" type="number" min="1" max="118" step="1" value="56" />
        <label for="fiss-na">f1 N</label>
        <input id="fiss-na" type="number" min="0" max="200" step="1" value="85" />
        <label for="fiss-zb">f2 Z</label>
        <input id="fiss-zb" type="number" min="1" max="118" step="1" value="36" />
        <label for="fiss-nb">f2 N</label>
        <input id="fiss-nb" type="number" min="0" max="200" step="1" value="56" />
        <button id="react-fission" type="button">Fission</button>
      </div>
      <span class="controls-sep" id="nuclide-sep" style="display:none">|</span>
      <label for="zoom-slider">Zoom</label>
      <input id="zoom-slider" type="range" min="0.05" max="5.0" step="0.05" value="1.0" />
      <span class="controls-sep">|</span>
      <label>Orbit</label>
      <span class="orbit-pad">
        <button id="orbit-up" type="button" aria-label="Orbit up">▲</button>
        <span class="orbit-pad-row">
          <button id="orbit-left" type="button" aria-label="Orbit left">◀</button>
          <button id="orbit-reset" type="button" aria-label="Reset orbit">⟲</button>
          <button id="orbit-right" type="button" aria-label="Orbit right">▶</button>
        </span>
        <button id="orbit-down" type="button" aria-label="Orbit down">▼</button>
      </span>
    </div>
    <script type="text/javascript">
      var canvas = document.getElementById('canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      window.onresize = function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
    </script>
    <script type="text/javascript" src="dist/index.js"></script>
  </body>
</html>
