<!DOCTYPE html>
<html>
  <head>
    <title> Vectors </title>
    <style>
      html, body {
        margin: 0;
      }
      #canvas {
        position: absolute;
        left: 0;
        right: 0;
        width: 100%;
        height: 100%;
      }
      #controls {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1;
        font-family: sans-serif;
        background: rgba(255, 255, 255, 0.85);
        padding: 8px 10px;
        border-radius: 6px;
      }
      #shear-value {
        width: 64px;
      }
      #scene-title {
        position: absolute;
        top: 56px;
        left: 12px;
        z-index: 1;
        font-family: sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #atom-label {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1;
        margin-top: 24px;
        text-align: center;
        font-family: sans-serif;
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #9ec5ff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        display: none;
      }
      #orbital-info {
        position: absolute;
        bottom: 16px;
        left: 0;
        right: 0;
        z-index: 1;
        text-align: center;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 18px;
        letter-spacing: 1px;
        color: #7fb0e6;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        display: none;
      }
      #molecule-info {
        position: absolute;
        top: 100px;
        right: 16px;
        z-index: 1;
        min-width: 200px;
        font-family: sans-serif;
        background: rgba(8, 14, 28, 0.78);
        border: 1px solid rgba(120, 160, 230, 0.45);
        border-radius: 8px;
        padding: 10px 14px;
        color: #cfe0ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        display: none;
      }
      .mol-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 3px 0;
        font-size: 15px;
      }
      .mol-label {
        color: #8fb3e6;
        font-weight: 600;
      }
      .mol-value {
        color: #eaf2ff;
      }
      #bond-btn {
        margin-left: 6px;
      }
      #add-btn,
      #clear-btn {
        margin-left: 4px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="scene-title">Cube POC</div>
    <div id="atom-label">Carbon</div>
    <div id="orbital-info">1s2 2s2 2p2</div>
    <div id="molecule-info"></div>
    <div id="controls">
      <button id="scene-toggle" type="button">Switch scene</button>
      <label for="view-2d">2D</label>
      <input id="view-2d" type="checkbox" />
      <span class="controls-sep">|</span>
      <label for="element-value">Element&nbsp;Z</label>
      <input id="element-value" type="number" min="1" max="36" step="1" value="6" />
      <span class="controls-sep">|</span>
      <label for="shear-value">Shear</label>
      <input id="shear-value" type="number" step="0.1" value="0.5" />
      <button id="shear-btn" type="button">Apply</button>
      <span class="controls-sep">|</span>
      <button id="bond-btn" type="button">Form bond</button>
      <span class="controls-sep">|</span>
      <button id="add-btn" type="button">Add</button>
      <button id="clear-btn" type="button">Clear</button>
    </div>
    <script type="text/javascript">
      var canvas = document.getElementById('canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      window.onresize = function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
    </script>
    <script type="text/javascript" src="dist/index.js"></script>
  </body>
</html>
