<!DOCTYPE html>
<html>
  <head>
    <title> Vectors </title>
    <style>
      html, body {
        margin: 0;
      }
      #canvas {
        position: absolute;
        left: 0;
        right: 0;
        width: 100%;
        height: 100%;
      }
      #controls {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 1;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #e6edff;
        background: rgba(15, 20, 35, 0.55);
        -webkit-backdrop-filter: blur(10px) saturate(140%);
        backdrop-filter: blur(10px) saturate(140%);
        padding: 10px 14px;
        border-radius: 14px;
        border: 1px solid rgba(140, 170, 235, 0.28);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        /* Initial state the anime.js entrance resolves FROM (opacity 0 → 1). */
        opacity: 0;
      }
      #controls label {
        color: #9fb6e6;
        font-weight: 600;
        letter-spacing: 0.3px;
        user-select: none;
      }
      #controls button {
        font: inherit;
        color: #eaf2ff;
        background: rgba(90, 120, 200, 0.28);
        border: 1px solid rgba(150, 180, 240, 0.35);
        border-radius: 999px;
        padding: 6px 14px;
        cursor: pointer;
        transition: background 0.18s ease, border-color 0.18s ease,
          transform 0.12s ease, box-shadow 0.18s ease;
      }
      #controls button:hover {
        background: rgba(120, 155, 245, 0.45);
        border-color: rgba(180, 205, 255, 0.6);
        box-shadow: 0 2px 12px rgba(90, 130, 240, 0.35);
      }
      #controls button:active {
        transform: translateY(1px) scale(0.97);
      }
      #controls input[type="number"] {
        font: inherit;
        color: #eaf2ff;
        background: rgba(8, 14, 28, 0.55);
        border: 1px solid rgba(150, 180, 240, 0.3);
        border-radius: 8px;
        padding: 5px 8px;
        width: 64px;
      }
      #controls input[type="checkbox"] {
        accent-color: #7f9bf5;
      }
      #controls .controls-sep {
        color: rgba(150, 180, 240, 0.35);
        padding: 0 2px;
        user-select: none;
      }
      #shear-value {
        width: 64px;
      }
      #scene-title {
        position: absolute;
        top: 56px;
        left: 12px;
        z-index: 1;
        font-family: sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #atom-label {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1;
        margin-top: 24px;
        text-align: center;
        font-family: sans-serif;
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #9ec5ff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        display: none;
      }
      #orbital-info {
        position: absolute;
        bottom: 16px;
        left: 0;
        right: 0;
        z-index: 1;
        text-align: center;
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 18px;
        letter-spacing: 1px;
        color: #7fb0e6;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        display: none;
      }
      #molecule-info {
        position: absolute;
        top: 100px;
        right: 16px;
        z-index: 1;
        min-width: 200px;
        font-family: sans-serif;
        background: rgba(8, 14, 28, 0.78);
        border: 1px solid rgba(120, 160, 230, 0.45);
        border-radius: 8px;
        padding: 10px 14px;
        color: #cfe0ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        display: none;
      }
      .mol-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 3px 0;
        font-size: 15px;
      }
      .mol-label {
        color: #8fb3e6;
        font-weight: 600;
      }
      .mol-value {
        color: #eaf2ff;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="scene-title">Cube POC</div>
    <div id="atom-label">Carbon</div>
    <div id="orbital-info">1s2 2s2 2p2</div>
    <div id="molecule-info"></div>
    <div id="controls">
      <button id="scene-toggle" type="button">Switch scene</button>
      <label for="view-2d">2D</label>
      <input id="view-2d" type="checkbox" />
      <span class="controls-sep">|</span>
      <label for="element-value">Element&nbsp;Z</label>
      <input id="element-value" type="number" min="1" max="36" step="1" value="6" />
      <span class="controls-sep">|</span>
      <label for="shear-value">Shear</label>
      <input id="shear-value" type="number" step="0.1" value="0.5" />
      <button id="shear-btn" type="button">Apply</button>
      <span class="controls-sep">|</span>
      <button id="bond-btn" type="button">Form bond</button>
      <span class="controls-sep">|</span>
      <button id="add-btn" type="button">Add</button>
      <button id="clear-btn" type="button">Clear</button>
    </div>
    <script type="text/javascript">
      var canvas = document.getElementById('canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      window.onresize = function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
    </script>
    <script type="text/javascript" src="dist/index.js"></script>
  </body>
</html>
