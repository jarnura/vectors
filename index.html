<!DOCTYPE html>
<html>
  <head>
    <title> Vectors </title>
    <style>
      html, body {
        margin: 0;
      }
      #canvas {
        position: absolute;
        left: 0;
        right: 0;
        width: 100%;
        height: 100%;
      }
      #controls {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1;
        font-family: sans-serif;
        background: rgba(255, 255, 255, 0.85);
        padding: 8px 10px;
        border-radius: 6px;
      }
      #shear-value {
        width: 64px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="controls">
      <label for="shear-value">Shear</label>
      <input id="shear-value" type="number" step="0.1" value="0.5" />
      <button id="shear-btn" type="button">Apply</button>
    </div>
    <script type="text/javascript">
      var canvas = document.getElementById('canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      window.onresize = function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
    </script>
    <script type="text/javascript" src="dist/index.js"></script>
  </body>
</html>
